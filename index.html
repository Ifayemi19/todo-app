<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="notificationBox"></div>

  <div class="container">

    <button id="darkModeToggle">🌙 Mode sombre</button>

    <h1>Ma Todo List</h1>

    <p id="taskCounter">0 tâche restante</p>

    <div id="filters">
      <button onclick="filterTasks('all')">Tout</button>
      <button onclick="filterTasks('todo')">À faire</button>
      <button onclick="filterTasks('done')">Terminées</button>
    </div>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Ajouter une tâche">
      <input type="date" id="taskDate">
      <button onclick="addTask()">Ajouter</button>
    </div>

    <ul id="taskList"></ul>

  </div>

  <script src="script.js"></script>

</body>
</html>
