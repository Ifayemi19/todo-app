<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Bouton mode sombre -->
    <button id="darkModeToggle">🌙 Mode sombre</button>

    <h1>Ma Todo List</h1>

    <p id="taskCounter">0 tâche restante</p>

    <div id="filters">
      <button onclick="filterTasks('all')">Tout</button>
      <button onclick="filterTasks('todo')">À faire</button>
      <button onclick="filterTasks('done')">Terminées</button>
    </div>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Ajouter une tâche">
      <button onclick="addTask()">Ajouter</button>
    </div>

    <ul id="taskList"></ul>

  </div>

  <script src="script.js"></script>

</body>
</html>
